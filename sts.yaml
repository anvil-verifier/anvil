apiVersion: anvil.dev/v1
kind: VStatefulSet
metadata:
  name: web
spec:
  serviceName: "nginx"
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: registry.k8s.io/nginx-slim:0.21
        ports:
        - containerPort: 8088
          name: web
        volumeMounts:
        - name: www
          mountPath: /usr/share/nginx/html
        resources:    
          requests:
            memory: "64Mi"
            cpu: "251m"
          limits:
            memory: "128Mi"
            cpu: "500m"
      tolerations:
      - key: "key1"
        operator: "Exists"
        effect: "NoSchedule"

  volumeClaimTemplates:
  - metadata:
      name: www
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
