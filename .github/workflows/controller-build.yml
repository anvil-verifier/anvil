name: Controller build
on:
  workflow_dispatch:
env:
  IMAGE_NAME: ${{ github.repository }}
jobs:
  setup-toolchain:
    runs-on: ubuntu-24.04
    outputs:
      verus-tag: ${{ steps.verus-tag.outputs.tag }}
    steps:
      - name: Discover the latest Verus release
        id: verus-tag
        run: |
          TAG=$(curl -fsSL https://api.github.com/repos/verus-lang/verus/releases/latest \
                | jq -r .tag_name | sed 's|^release/||')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest Verus release: $TAG"
      - uses: actions/checkout@v4
      - name: Cache toolchains
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
            ~/verus
          key: toolchain-${{ runner.os }}-${{ steps.verus-tag.outputs.tag }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Install Rust if cache is missing
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL "https://sh.rustup.rs" \
            | sh -s -- --default-toolchain none -y
          . "$HOME/.cargo/env"
          rustup toolchain install
      - name: Download Verus if cache is missing
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          TAG="${{ steps.verus-tag.outputs.tag }}"
          curl -fsSL -o /tmp/verus.zip \
            "https://github.com/verus-lang/verus/releases/download/release%2F${TAG}/verus-${TAG}-x86-linux.zip"
          unzip -q /tmp/verus.zip -d "$HOME"
          mv "$HOME/verus-x86-linux" "$HOME/verus"
          rm /tmp/verus.zip
      - name: Seed cargo registry
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          . "$HOME/.cargo/env"
          cargo fetch

  build-vreplicaset-controller:
    needs: setup-toolchain
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
            ~/verus
          key: toolchain-${{ runner.os }}-${{ needs.setup-toolchain.outputs.verus-tag }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Log into registry ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build vreplicaset controller image
        run: |
          . "$HOME/.cargo/env"
          export PATH="$PATH:$HOME/verus"
          cargo verus build --release --bin vreplicaset_controller -- --no-verify --time
          docker build -f docker/controller/Dockerfile -t ghcr.io/${{ env.IMAGE_NAME }}/vreplicaset-controller:latest --build-arg APP=vreplicaset .
          docker tag ghcr.io/${{ env.IMAGE_NAME }}/vreplicaset-controller:latest ghcr.io/${{ env.IMAGE_NAME }}/vreplicaset-controller:${{ github.sha }}
      - name: Push vreplicaset controller image
        run: |
          docker push ghcr.io/${{ env.IMAGE_NAME }}/vreplicaset-controller:latest
          docker push ghcr.io/${{ env.IMAGE_NAME }}/vreplicaset-controller:${{ github.sha }}

