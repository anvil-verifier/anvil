            target
          key: toolchain-${{ runner.os }}-${{ needs.setup-toolchain.outputs.verus-tag }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Verify the ESR composition
        run: |
          . "$HOME/.cargo/env"
          export PATH="$PATH:$HOME/verus"
          cargo verus focus --lib -- --rlimit 50 --time --verify-module composition

  framework-verification:
    needs: setup-toolchain
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo
            ~/.rustup
            ~/verus
            target
          key: toolchain-${{ runner.os }}-${{ needs.setup-toolchain.outputs.verus-tag }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Verify the Anvil framework
        run: |
          . "$HOME/.cargo/env"
          export PATH="$PATH:$HOME/verus"
          cargo verus focus --lib -- --rlimit 50 --time \
            --verify-module kubernetes_api_objects \
            --verify-module kubernetes_cluster \
            --verify-module reconciler \
            --verify-module state_machine \
            --verify-module tla_demo \
            --verify-module vstd_ext

  vreplicaset-admission-e2e-test:
    needs: setup-toolchain
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo
            ~/.rustup
            ~/verus
            target
          key: toolchain-${{ runner.os }}-${{ needs.setup-toolchain.outputs.verus-tag }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go_version }}
      - name: Install kind
        run: go install sigs.k8s.io/kind@v$kind_version
      - name: Deploy vreplicaset admission controller
        run: |
          . "$HOME/.cargo/env"
          export PATH="$PATH:$HOME/verus"
          ./local-test.sh vreplicaset-admission --build
      - name: Run vreplicaset e2e tests for admission
        run: . "$HOME/.cargo/env" && cd e2e && cargo run -- vreplicaset-admission

