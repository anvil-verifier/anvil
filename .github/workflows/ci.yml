      - name: Verify vstatefulset controller
        run: |
          . "$HOME/.cargo/env"
          export PATH="$PATH:$HOME/verus"
          cargo verus focus --lib -- --rlimit 50 --time --verify-module vstatefulset_controller

  rabbitmq-verification:
