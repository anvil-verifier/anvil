  vreplicaset-admission-e2e-test:
    needs: setup-toolchain
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ${{ env.home_dir }}/.cargo
