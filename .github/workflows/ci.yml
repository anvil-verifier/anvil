name: Continuous integration
run-name: Continuous integration run by ${{ github.actor }}
on:
  # push:
  #   branches:
  #     - main
  #   paths-ignore:
  #     - "README.md"
  #     - ".gitignore"
  #     - "doc/**"
  pull_request:
  merge_group:
  workflow_dispatch:
env:
  # Match the Verus release pinned in Cargo.toml ("vstd = "=...").
  verus_release: 0.2026.05.10.0145
  kind_version: 0.23.0
  go_version: "^1.20"
  home_dir: /home/runner

jobs:
  setup-toolchain:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Get HOME env variable
        run: echo "home_dir=$HOME" >> $GITHUB_ENV
      - name: Cache toolchains
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.home_dir }}/.cargo
            ${{ env.home_dir }}/.rustup
            ${{ env.home_dir }}/verus
          key: toolchain-${{ runner.os }}-${{ env.verus_release }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Install Rust if cache is missing
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL "https://sh.rustup.rs" | sh -s -- --default-toolchain none -y
          . "$HOME/.cargo/env"
          rustup toolchain install
      - name: Download Verus if cache is missing
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o /tmp/verus.zip \
            "https://github.com/verus-lang/verus/releases/download/release%2F${verus_release}/verus-${verus_release}-x86-linux.zip"
          unzip -q /tmp/verus.zip -d "$HOME"
          mv "$HOME/verus-x86-linux" "$HOME/verus"
          rm /tmp/verus.zip
      - name: Seed cargo registry cache
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          . "$HOME/.cargo/env"
          cargo fetch

  vreplicaset-verification:
    needs: setup-toolchain
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ${{ env.home_dir }}/.cargo
            ${{ env.home_dir }}/.rustup
            ${{ env.home_dir }}/verus
          key: toolchain-${{ runner.os }}-${{ env.verus_release }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Verify vreplicaset controller
        run: |
          . "$HOME/.cargo/env"
          export PATH="$PATH:$HOME/verus"
          cargo verus verify vreplicaset_controller -- --rlimit 50 --time --verify-module vreplicaset_controller

  vdeployment-verification:
    needs: setup-toolchain
    runs-on: ubuntu-24.04
