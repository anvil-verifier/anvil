name: Continuous integration
run-name: Continuous integration run by ${{ github.actor }}
on:
  pull_request:
  merge_group:
  workflow_dispatch:
env:
  kind_version: 0.23.0
  go_version: "^1.20"
  # should match the vstd version in Cargo.toml
  # https://github.com/verus-lang/verus/releases
  VERUS_TAG: "0.2026.07.12.0b42f4c"

jobs:
  setup-toolchain:
    runs-on: ubuntu-24.04
    outputs:
      verus-tag: ${{ steps.verus-tag.outputs.tag }}
    steps:
      - name: Pin the Verus release matching vstd in Cargo.toml
        id: verus-tag
        run: |
          TAG="$VERUS_TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Pinned Verus release: $TAG"
      - uses: actions/checkout@v7
      - name: Cache toolchains
        id: cache-toolchain
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo
            ~/.rustup
            ~/verus
            target
          key: toolchain-${{ runner.os }}-${{ steps.verus-tag.outputs.tag }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Install Rust if cache is missing
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL "https://sh.rustup.rs" \
            | sh -s -- --default-toolchain none -y
          . "$HOME/.cargo/env"
          rustup toolchain install
      - name: Download Verus if cache is missing
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          TAG="${{ steps.verus-tag.outputs.tag }}"
          curl -fsSL -o /tmp/verus.zip \
            "https://github.com/verus-lang/verus/releases/download/release%2F${TAG}/verus-${TAG}-x86-linux.zip"
          unzip -q /tmp/verus.zip -d "$HOME"
          mv "$HOME/verus-x86-linux" "$HOME/verus"
          rm /tmp/verus.zip

  full-verification:
    needs: setup-toolchain
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo
            ~/.rustup
            ~/verus
            target
          key: toolchain-${{ runner.os }}-${{ needs.setup-toolchain.outputs.verus-tag }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Verify vreplicaset controller
        run: |
          . "$HOME/.cargo/env"
          export PATH="$PATH:$HOME/verus"
          cargo verus verify --lib

  vreplicaset-admission-e2e-test:
    needs: setup-toolchain
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo
            ~/.rustup
            ~/verus
            target
          key: toolchain-${{ runner.os }}-${{ needs.setup-toolchain.outputs.verus-tag }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go_version }}
          cache: false
      - name: Install kind
        run: go install sigs.k8s.io/kind@v$kind_version
      - name: Deploy vreplicaset admission controller
        run: |
          . "$HOME/.cargo/env"
          export PATH="$PATH:$HOME/verus"
          ./local-test.sh vreplicaset-admission --build
      - name: Run vreplicaset e2e tests for admission
        run: . "$HOME/.cargo/env" && cd e2e && cargo run -- vreplicaset-admission

  vdeployment-admission-e2e-test:
